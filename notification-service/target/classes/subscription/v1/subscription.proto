syntax = "proto3";

package subscription.v1;

import "google/protobuf/timestamp.proto";
import "notification/v1/notification.proto";

option java_package = "br.com.poc.grpc.subscription.v1";
option java_multiple_files = true;
option java_outer_classname = "SubscriptionProto";

// SubscriptionService manages user topic subscriptions.
service SubscriptionService {
  // Subscribe registers a user to receive notifications for a topic (unary).
  rpc Subscribe(SubscribeRequest) returns (SubscribeResponse);

  // Unsubscribe removes a user subscription (unary).
  rpc Unsubscribe(UnsubscribeRequest) returns (UnsubscribeResponse);

  // ListSubscriptions streams all active subscriptions for a user (server streaming).
  rpc ListSubscriptions(ListSubscriptionsRequest) returns (stream Subscription);

  // PublishToSubscribers notifies all subscribers of a topic (unary → calls notification-service).
  rpc PublishToSubscribers(PublishToSubscribersRequest) returns (PublishToSubscribersResponse);
}

// ------------------------------------------------------------------
// Messages
// ------------------------------------------------------------------

message Subscription {
  string subscription_id = 1;
  string user_id = 2;
  string topic = 3;
  notification.v1.NotificationPriority min_priority = 4;
  google.protobuf.Timestamp subscribed_at = 5;
  bool active = 6;
}

message SubscribeRequest {
  string user_id = 1;
  string topic = 2;
  notification.v1.NotificationPriority min_priority = 3;
}

message SubscribeResponse {
  string subscription_id = 1;
  google.protobuf.Timestamp subscribed_at = 2;
}

message UnsubscribeRequest {
  string user_id = 1;
  string topic = 2;
}

message UnsubscribeResponse {
  bool success = 1;
}

message ListSubscriptionsRequest {
  string user_id = 1;
  bool active_only = 2;
}

message PublishToSubscribersRequest {
  string topic = 3;
  string title = 1;
  string body = 2;
  notification.v1.NotificationPriority priority = 4;
  map<string, string> metadata = 5;
}

message PublishToSubscribersResponse {
  int32 notifications_sent = 1;
  repeated string failed_user_ids = 2;
}
