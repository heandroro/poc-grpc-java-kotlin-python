spring:
  application:
    name: notification-service
  threads:
    virtual:
      enabled: true

grpc:
  server:
    port: 50051

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4317}

notification:
  jwt:
    secret: ${JWT_SECRET:poc-grpc-super-secret-key-change-in-production}
