syntax = "proto3";

package analytics.v1;

import "google/protobuf/timestamp.proto";
import "notification/v1/notification.proto";

option java_package = "br.com.poc.grpc.analytics.v1";
option java_multiple_files = true;
option java_outer_classname = "AnalyticsProto";

// AnalyticsService provides aggregated notification metrics.
service AnalyticsService {
  // GetStats returns aggregated stats for a topic or user (unary).
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);

  // StreamMetrics streams live metric snapshots (server streaming).
  rpc StreamMetrics(StreamMetricsRequest) returns (stream MetricSnapshot);

  // RecordEvent ingests a notification lifecycle event (unary).
  rpc RecordEvent(RecordEventRequest) returns (RecordEventResponse);
}

// ------------------------------------------------------------------
// Messages
// ------------------------------------------------------------------

message GetStatsRequest {
  oneof filter {
    string user_id = 1;
    string topic = 2;
  }
  google.protobuf.Timestamp from = 3;
  google.protobuf.Timestamp to = 4;
}

message GetStatsResponse {
  int64 total_sent = 1;
  int64 total_delivered = 2;
  int64 total_acknowledged = 3;
  int64 total_failed = 4;
  double delivery_rate = 5;
  double ack_rate = 6;
}

message StreamMetricsRequest {
  // Interval in seconds between snapshots.
  int32 interval_seconds = 1;
  repeated string topics = 2;
}

message MetricSnapshot {
  string topic = 1;
  int64 sent_last_interval = 2;
  int64 delivered_last_interval = 3;
  int64 failed_last_interval = 4;
  google.protobuf.Timestamp snapshot_at = 5;
}

message RecordEventRequest {
  string notification_id = 1;
  string user_id = 2;
  string topic = 3;
  notification.v1.NotificationState state = 4;
  google.protobuf.Timestamp occurred_at = 5;
}

message RecordEventResponse {
  bool recorded = 1;
}
